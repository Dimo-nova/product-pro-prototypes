<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dimonova · Prototipos de carta digital</title>
  <link rel="icon" type="image/png" href="logos/favicon.png" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --card-hover: #1d2129;
      --border: #262b36;
      --text: #eef0f4;
      --muted: #8b93a3;
      --accent: #e8a13c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
    header { margin-bottom: 28px; }
    h1 { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 12px; font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; }
    h1 img { height: 30px; width: auto; max-width: 100%; display: block; }
    h1 span { color: var(--muted); font-weight: 400; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
    .search {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    .search:focus { border-color: var(--accent); }
    .count { color: var(--muted); font-size: 0.8rem; margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
    .card {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .card:hover { background: var(--card-hover); border-color: var(--accent); }
    .card h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
    .card .meta { color: var(--muted); font-size: 0.82rem; display: flex; gap: 8px; flex-wrap: wrap; }
    .card .tagline {
      color: var(--muted); font-size: 0.85rem; margin-top: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .badge {
      display: inline-block; font-size: 0.7rem; padding: 2px 8px;
      border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
    }
    .badge.own { border-color: var(--accent); color: var(--accent); }
    .empty { color: var(--muted); text-align: center; padding: 60px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><img src="logos/logo_header.png" alt="Dimonova" /><span>· prototipos</span></h1>
      <p class="sub">Cartas digitales de demostración. Cada prototipo se abre en pestaña nueva, sin vuelta atrás.</p>
    </header>

    <input class="search" type="search" id="q" placeholder="Buscar por nombre, ciudad o slug…" autocomplete="off" autofocus />
    <p class="count" id="count"></p>
    <div class="grid" id="grid"></div>
    <p class="empty hidden" id="empty">Sin resultados.</p>
  </div>

  <script>
    let items = [];
    const grid = document.getElementById("grid");
    const q = document.getElementById("q");
    const count = document.getElementById("count");
    const empty = document.getElementById("empty");

    const norm = (s) =>
      (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");

    function render(filter) {
      const f = norm(filter);
      const visible = items.filter(
        (p) =>
          !p.archived &&
          (!f || norm(`${p.name} ${p.slug} ${p.location} ${p.tagline}`).includes(f))
      );
      grid.innerHTML = visible
        .map(
          (p) => `
        <a class="card" href="prototypes/${p.slug}/" target="_blank" rel="noopener">
          <h2>${p.name}</h2>
          <div class="meta">
            ${p.location ? `<span>${p.location}</span>` : ""}
            <span class="badge ${p.ownData ? "own" : ""}">${p.ownData ? "datos propios" : "datos demo"}</span>
            ${p.updated ? `<span>${p.updated}</span>` : ""}
          </div>
          ${p.tagline ? `<p class="tagline">${p.tagline}</p>` : ""}
        </a>`
        )
        .join("");
      count.textContent = `${visible.length} prototipo${visible.length === 1 ? "" : "s"}`;
      empty.classList.toggle("hidden", visible.length > 0);
    }

    fetch("manifest.json")
      .then((r) => r.json())
      .then((data) => {
        items = data.prototypes.sort((a, b) =>
          (b.updated || "").localeCompare(a.updated || "")
        );
        render("");
      })
      .catch(() => {
        empty.textContent = "No se pudo cargar manifest.json — ejecuta: node _build-manifest.js";
        empty.classList.remove("hidden");
      });

    q.addEventListener("input", () => render(q.value));
  </script>
</body>
</html>
